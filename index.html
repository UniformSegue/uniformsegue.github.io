<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PorteFolio</title>
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Protest+Guerrilla&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/cascadia-code" rel="stylesheet">
</head>

<body>
<div class="Main">
    <h1 class="title">Maxence ROGER</h1>
    <header>
            <div class="buttonHeaderBox" style="width: 400px">
            <div class="ProjectButtonMain" >
                <a href="#ProjecetsId"><input name="ProjectsHeader" value="Projets" type="button" class="buttonHeader"></a>
            </div>

            <div class="ContactButtonMain">
                <a href="#ContactId"><input name="ContactHeader" value="Contacte" type="button" class="buttonHeader"></a>
            </div>
            </div>

    </header>
    <a id="ProjecetsId"></a>
    <div class="Presantion" >

        <div class="TextPresantion" style="height: 230px">
            <div class="Text">
                <h2>Projets</h2>
                <p>J'ai de nombreux projets que j'ai développés au fil des années dans de nombreux domaines.</p>
            </div>
            <button name="Button" class="Button" onclick="window.location.href='./project/projects.html'" >Projets >></button>
        </div>
        <div class="ImgProjectPresantion">

            <img src="img/terminal.gif" class="ProjectImg" alt="TerminalJava">

        </div>

    </div>


    <a id="ContactId"></a>
    <div class="Presantion" >
        <div class="TextPresantion" style="height: 200px">
            <div class="Text">
                <h2>Contacte</h2>
                <p>Pour me contacter :</p>
            </div>
            <button name="Button" class="Button" onclick="window.location.href='./contact/contact.html'">Contacte >></button>
        </div>
        <div class="ImgMoiPresantion">
            <img src="img/moi.jpg" class="MoiImg" alt="Skills">

        </div>
    </div>


</div>


</body>
</html>
