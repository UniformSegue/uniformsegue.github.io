<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PorteFolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Protest+Guerrilla&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/cascadia-code" rel="stylesheet">
</head>

<body>
<div class="Main">
    <h1 class="title">Maxence ROGER</h1>
    <header>
            <div class="buttonHeaderBox">
            <div class="ProjectButtonMain" >
                <a href="#ProjecetsId"><input name="ProjectsHeader" value="Projects" type="button" class="buttonHeader"></a>
            </div>

            <div class="CompetenceButtonMain">
                <a href="#SkillsId"><button name="SkillsHeader" class="buttonHeader">Skills</button></a>
            </div>

            <div class="ContactButtonMain">
                <a href="#ContactId"><input name="ContactHeader" value="Contact" type="button" class="buttonHeader"></a>
            </div>
            </div>

    </header>
    <a id="ProjecetsId"></a>
    <div class="Presantion" >

        <div class="TextPresantion">
            <div class="Text">
                <h2>Projets</h2>
                <p>Mes projets sont diverse et varié dans beaucoup de domaine lié presque toujours à l'informatique</p>
            </div>
            <button name="Button" class="Button" onclick="window.location.href='./project/projects.html'" >Projets >></button>
        </div>
        <div class="ImgProjectPresantion">

            <img src="img/terminal.gif" class="ProjectImg" alt="TerminalJava">

        </div>

    </div>

    <a id="SkillsId"></a>
    <div class="Presantion" >
        <div class="TextPresantion">
            <div class="Text">
                <h2>Skills</h2>
                <p>Text for skills</p>
            </div>
            <button name="Button" class="Button">Project >></button>
        </div>
        <div class="ImgSkillsPresantion">
            <img src="img/skills_img.png" class="SkillsImg" alt="Skills">

        </div>
    </div>

    <a id="ContactId"></a>
    <div class="Presantion" >
        <div class="TextPresantion" style="height: 200px">
            <div class="Text">
                <h2>Contact</h2>
                <p>Pour me contacter :</p>
            </div>
            <button name="Button" class="Button" onclick="window.location.href='./contact/contact.html'">Contact >></button>
        </div>
        <div class="ImgMoiPresantion">
            <img src="img/moi.jpg" class="MoiImg" alt="Skills">

        </div>
    </div>


</div>


</body>
</html>
